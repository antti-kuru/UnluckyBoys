services:
  server:
    build: server
    restart: unless-stopped
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./database-migrations:/app/database-migrations
      - ./sqlite-data:/app/data
      - ./client/public/news:/app/uploads/news
      - ./client/public/players:/app/uploads/players
    env_file:
      - project.env
    environment:
      - API_PORT=8000
      - SQLITE_PATH=/app/data/unlucky-boys.sqlite
      - SQLITE_MIGRATIONS_DIR=/app/database-migrations
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.server-router.entrypoints=web"
      - "traefik.http.routers.server-router.rule=PathPrefix(`/api`)"
      - "traefik.http.services.server-service.loadbalancer.server.port=8000"

  client:
    build: client
    restart: unless-stopped
    environment:
      - API_BASE_URL=http://server:8000/api
      - API_PROXY_TARGET=http://server:8000
    volumes:
      - ./client:/app
    depends_on:
      - server
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.client-router.entrypoints=web"
      - "traefik.http.routers.client-router.rule=PathPrefix(`/`)"
      - "traefik.http.services.client-service.loadbalancer.server.port=4321"

  traefik:
    image: traefik:v3.3
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:8000"
    ports:
      - "8080:8080"
      - "8000:8000"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
