apiVersion: apps/v1
kind: Deployment
metadata:
  name: unlucky-boys-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: unlucky-boys-server
  template:
    metadata:
      labels:
        app: unlucky-boys-server
    spec:
      containers:
        - name: server
          image: ghcr.io/example/unlucky-boys-server:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: unlucky-boys-config
            - secretRef:
                name: unlucky-boys-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: unlucky-boys-server
spec:
  selector:
    app: unlucky-boys-server
  ports:
    - port: 8000
      targetPort: 8000
