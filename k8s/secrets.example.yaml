apiVersion: v1
kind: Secret
metadata:
  name: unlucky-boys-secrets
type: Opaque
stringData:
  DATABASE_URL: postgres://user:password@postgres-host:5432/unlucky_boys
  REDIS_URL: redis://unlucky-boys-redis:6379
  SESSION_SECRET: replace-with-at-least-32-random-characters
  ADMIN_EMAIL: admin@unluckyboys.local
  ADMIN_PASSWORD: replace-before-deploy
